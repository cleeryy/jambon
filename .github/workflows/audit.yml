name: Security Audit

on:
  push:
    branches: [master, dev]
    paths: ['**/Cargo.toml', '**/Cargo.lock']
  pull_request:
    paths: ['**/Cargo.toml', '**/Cargo.lock']
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-deny:
    permissions:
      checks: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/audit@v1
        with:
          denyWarnings: true
